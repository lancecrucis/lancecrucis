name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # runs once a day
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: lancecrucis
          outputs: |
            dist/github-contribution-grid-snake-blue.svg?palette=github-dark&color_snake=5C7AEA&color_dots=050B18,0A1A4A,002FA7,3B5FDB,5C7AEA

      - name: Push snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
